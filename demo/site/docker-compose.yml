version: '3.8'
services:
  web:
    image: acme/habits-web:0.3.0
    environment:
      - DATABASE_URL=postgres://acme:s3cret_db_password@db:5432/habits
      - SUPABASE_SERVICE_ROLE_KEY=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJvbGUiOiJzZXJ2aWNlX3JvbGUifQ.demo_service_xxxxxxxxxxxxxxxxxxxxxx
      - STRIPE_WEBHOOK_SECRET=whsec_DemoFakeWebhookSecret123456
      - ADMIN_TOKEN=admin_DemoFakeStaticToken000
